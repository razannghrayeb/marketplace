services:
  # ==========================================================================
  # API Server
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set HF_TOKEN in .env or CI secrets if razangh/fashion-models is private
        HF_TOKEN: ${HF_TOKEN:-}
        # Default Dockerfile arg EMBEDDED_YOLO=1: PyTorch+YOLO venv in image (entrypoint starts FastAPI on loopback).
        # Faster slim build (requires external detector): EMBEDDED_YOLO: "0" + YOLOV8_SERVICE_URL=http://yolov8:8001 + profile yolo-sidecar
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/fashion
      - REDIS_URL=redis://redis:6379
      - OPENSEARCH_URL=http://opensearch-node:9200
      - RANKER_API_URL=http://ranker:8000
      # Bundled YOLO (docker-entrypoint starts uvicorn on 127.0.0.1:8001). Do not point at yolov8 unless you use EMBEDDED_YOLO=0.
      - YOLOV8_SERVICE_URL=http://127.0.0.1:8001
      - ONNX_API_URL=http://onnx-inference:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # OpenSearch
  # ==========================================================================
  opensearch-node:
    image: opensearchproject/opensearch:latest
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=MyStr0ng!Pass#2026
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:9200"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch-node:9200"]
    ports:
      - "5601:5601"
    depends_on:
      - opensearch-node

  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fashion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # ONNX Inference Service (FashionCLIP + Attributes)
  # ==========================================================================
  onnx-inference:
    build:
      context: ./src/lib/model
      dockerfile: Dockerfile.onnx
    ports:
      - "8002:8000"
    environment:
      - MODEL_DIR=/models
      - ONNX_NUM_THREADS=4
    volumes:
      - ./models:/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  ranker:
    build:
      context: ./src/lib/model
      dockerfile: Dockerfile.ranker
    ports:
      - "8000:8000"
    environment:
      - RANKER_MODEL_PATH=/app/models/xgb_ranker_model.json
      - RANKER_META_PATH=/app/models/ranker_model_metadata.json
    volumes:
      - ranker_models:/app/models
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # Optional separate detector (e.g. GPU). Default stack uses YOLO inside the api image (loopback).
  # Start with: docker compose --profile yolo-sidecar up -d yolov8
  yolov8:
    profiles:
      - yolo-sidecar
    build:
      context: ./src/lib/model
      dockerfile: Dockerfile.yolo
    ports:
      - "8001:8001"
    environment:
      - YOLO_MODEL_PATH=kesimeg/yolov8n-clothing-detection
      - YOLO_FASHION_MODEL_PATH=kesimeg/yolov8n-clothing-detection
      - YOLO_CONFIDENCE_THRESHOLD=0.25
      - YOLO_IOU_THRESHOLD=0.45
      - YOLO_MAX_DETECTIONS=30
    volumes:
      - yolo_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  ranker_models:
    driver: local
  yolo_models:
    driver: local
