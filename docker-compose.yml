services:
  # ==========================================================================
  # API Server
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set HF_TOKEN in .env or CI secrets if razangh/fashion-models is private
        HF_TOKEN: ${HF_TOKEN:-}
        # Default Dockerfile arg EMBEDDED_YOLO=1: PyTorch+YOLO venv in image (entrypoint starts FastAPI on loopback).
        # Faster slim build (requires external detector): EMBEDDED_YOLO: "0" + YOLOV8_SERVICE_URL=http://yolov8:8001 + profile yolo-sidecar
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/fashion
      - REDIS_URL=redis://redis:6379
      - OPENSEARCH_URL=http://opensearch-node:9200
      - RANKER_API_URL=http://ranker:8000
      # Bundled YOLO (docker-entrypoint starts uvicorn on 127.0.0.1:8001). Do not point at yolov8 unless you use EMBEDDED_YOLO=0.
      - YOLOV8_SERVICE_URL=http://127.0.0.1:8001
      - YOLO_TRANSPORT=${YOLO_TRANSPORT:-auto}
      - YOLO_GRPC_ADDRESS=${YOLO_GRPC_ADDRESS:-127.0.0.1:50052}
      - ONNX_API_URL=http://onnx-inference:8000
      - ONNX_GRPC_ADDRESS=onnx-inference:50051
      - SEARCH_IMAGE_RERANK_TRANSPORT=${SEARCH_IMAGE_RERANK_TRANSPORT:-grpc}
      - CLIP_EXECUTION_PROVIDERS=${CLIP_EXECUTION_PROVIDERS:-cuda,cpu}
      - CLIP_USE_GPU=${CLIP_USE_GPU:-true}
      # Optional external BLIP service (HF InstructBLIP). Keep empty to use local ONNX BLIP in Node.
      - BLIP_API_URL=${BLIP_API_URL:-}
      - BLIP_API_TIMEOUT_MS=${BLIP_API_TIMEOUT_MS:-8000}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch-node:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # OpenSearch
  # ==========================================================================
  opensearch-node:
    image: opensearchproject/opensearch:latest
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=MyStr0ng!Pass#2026
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:9200"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch-node:9200"]
    ports:
      - "5601:5601"
    depends_on:
      - opensearch-node

  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fashion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # ONNX Inference Service (FashionCLIP + Attributes)
  # ==========================================================================
  onnx-inference:
    build:
      context: ./src/lib/model
      dockerfile: Dockerfile.onnx
    ports:
      - "8002:8000"
      - "50051:50051"
    environment:
      - MODEL_DIR=/models
      - ONNX_NUM_THREADS=4
      - ONNX_EXECUTION_PROVIDERS=${ONNX_EXECUTION_PROVIDERS:-TensorrtExecutionProvider,CUDAExecutionProvider,CPUExecutionProvider}
      - ONNX_GRPC_PORT=${ONNX_GRPC_PORT:-50051}
      - TRT_ENGINE_CACHE_PATH=${TRT_ENGINE_CACHE_PATH:-/tmp/trt_engine_cache}
      - TRT_FP16_ENABLE=${TRT_FP16_ENABLE:-1}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  ranker:
    build:
      context: ./src/lib/model
      dockerfile: Dockerfile.ranker
    ports:
      - "8000:8000"
    environment:
      - RANKER_MODEL_PATH=/app/models/xgb_ranker_model.json
      - RANKER_META_PATH=/app/models/ranker_model_metadata.json
    volumes:
      - ranker_models:/app/models
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # Optional separate detector (e.g. GPU). Default stack uses YOLO inside the api image (loopback).
  # Start with: docker compose --profile yolo-sidecar up -d yolov8
  yolov8:
    profiles:
      - yolo-sidecar
    build:
      context: ./src/lib/model
      dockerfile: Dockerfile.yolo
    ports:
      - "8001:8001"
      - "50052:50052"
    environment:
      - YOLO_GRPC_PORT=50052
      - YOLO_MODEL_PATH=kesimeg/yolov8n-clothing-detection
      - YOLO_FASHION_MODEL_PATH=kesimeg/yolov8n-clothing-detection
      - YOLO_CONFIDENCE_THRESHOLD=0.25
      - YOLO_IOU_THRESHOLD=0.45
      - YOLO_MAX_DETECTIONS=30
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - yolo_models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Optional BLIP sidecar with model baked into the container image at build time.
  # Start with: docker compose --profile blip-sidecar up -d blip
  # Then set BLIP_API_URL=http://blip:8080 for the api service.
  blip:
    profiles:
      - blip-sidecar
    build:
      context: ./src/lib/model
      dockerfile: Dockerfile.blip
      args:
        HF_TOKEN: ${HF_TOKEN:-}
        BLIP_HF_REPO: ${BLIP_HF_REPO:-Salesforce/instructblip-flan-t5-xl}
    ports:
      - "8003:8080"
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - MODEL_PATH=/app/model
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  ranker_models:
    driver: local
  yolo_models:
    driver: local
