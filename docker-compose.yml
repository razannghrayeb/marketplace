services:
  opensearch-node:
    image: opensearchproject/opensearch:latest
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=MyStr0ng!Pass#2026
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch-node:9200"]
    ports:
      - "5601:5601"
    depends_on:
      - opensearch-node

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fashion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  ranker:
    build:
      context: ./src/lib/model
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RANKER_MODEL_PATH=/app/models/xgb_ranker_model.json
      - RANKER_META_PATH=/app/models/ranker_model_metadata.json
    volumes:
      - ranker_models:/app/models
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "ranker_api:app", "--host", "0.0.0.0", "--port", "8000"]

  yolov8:
    build:
      context: ./src/lib/model
      dockerfile: Dockerfile.yolo
    ports:
      - "8001:8001"
    environment:
      - YOLO_MODEL_PATH=/app/models/yolov8n.pt
      - YOLO_FASHION_MODEL_PATH=/app/models/yolov8-fashion.pt
      - YOLO_CONFIDENCE_THRESHOLD=0.25
      - YOLO_IOU_THRESHOLD=0.45
      - YOLO_MAX_DETECTIONS=30
    volumes:
      - yolo_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  ranker_models:
    driver: local
  yolo_models:
    driver: local
